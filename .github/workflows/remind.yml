name: Reminder

on:
  schedule:
    - cron: "25 0 * * 1-7"
    - cron: "30 12 * * 1-7"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python remind.py
